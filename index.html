<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Berk & Merve</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap');

        :root {
            --bg-color: #111;
            --accent-color: #ff3366; /* Aşk Kırmızısı */
            --tick-color: rgba(255, 255, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            user-select: none; /* Metin seçimini engelle */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Scrollbarları tamamen kapat */
            overscroll-behavior: none; /* Sayfa esnemesini engelle (iOS) */
            touch-action: none; /* Tarayıcı zoom/scroll hareketlerini iptal et */
            height: 100vh;
            width: 100vw;
            cursor: grab; /* Sürükleme imleci */
        }
        
        body:active {
            cursor: grabbing;
        }

        /* Başlangıç Ekranı (Ses İzni İçin Şart) */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-out;
        }

        .start-btn {
            padding: 20px 40px;
            font-size: 1.2rem;
            background: var(--accent-color);
            border: none;
            color: white;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.5);
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Zaman Göstergesi (Üstte Sabit) */
        .time-display {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            letter-spacing: 2px;
            color: var(--accent-color);
            z-index: 100;
            opacity: 0; /* Başlangıçta gizli */
            transition: opacity 1s;
        }

        /* Ana Taşıyıcı */
        .timeline-wrapper {
            position: absolute;
            top: 0; left: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            padding-left: 50vw; /* Ortadan başlat */
            will-change: transform; /* Performans artırıcı */
        }

        .track {
            display: flex;
            align-items: center;
            height: 60vh;
        }

        /* Küçük Çizgiler */
        .tick-s {
            width: 2px;
            height: 30px;
            background: var(--tick-color);
            margin: 0 20px; /* Tikler arası mesafe */
            flex-shrink: 0;
        }

        /* Büyük Çizgiler (Anı Noktaları) */
        .tick-l {
            width: 4px;
            height: 100px;
            background: white;
            margin: 0 40px;
            flex-shrink: 0;
            position: relative;
            transition: all 0.3s;
        }

        /* Anı Kartı */
        .memory-card {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            width: 80vw; /* Telece ekranının %80'i */
            max-width: 350px;
            background: #222;
            padding: 15px;
            border-radius: 15px;
            opacity: 0.3;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            border: 1px solid #444;
        }

        .memory-card img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
            object-fit: cover;
            height: 200px;
            background-color: #333; /* Resim yüklenmezse gri dursun */
        }

        .memory-card h3 { color: var(--accent-color); margin: 5px 0; }
        .memory-card p { font-size: 0.9rem; color: #ccc; line-height: 1.4; }

        /* Aktif Kart Durumu */
        .tick-l.active {
            background: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
            height: 120px;
        }
        
        .tick-l.active .memory-card {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            bottom: 140px;
            z-index: 10;
        }

        /* Teklif Bölümü */
        .final-card {
            min-width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .swipe-hint {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: gray;
            font-size: 0.8rem;
            animation: bounce 2s infinite;
            pointer-events: none;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    </style>
</head>
<body>

    <div id="start-overlay">
        <h2 style="margin-bottom: 20px; color: white;">Merve & Berk</h2>
        <button class="start-btn" id="startBtn">Zaman Yolculuğunu Başlat</button>
        <p style="color: gray; margin-top: 10px; font-size: 0.8rem;">(Sesli ve Tam Ekran Deneyim)</p>
    </div>

    <div class="time-display" id="yearDisplay">2024</div>
    <div class="swipe-hint">← KAYDIR →</div>

    <div class="timeline-wrapper" id="timeline">
        <div class="track" id="track"></div>
        
        <div class="final-card">
            <h1>Yolculuk Bitti mi?</h1>
            <p>Hayır, asıl şimdi başlıyor...</p>
            <br>
            <button class="start-btn" onclick="sendWhatsapp()">Yemeğe Gidelim mi? 🌹</button>
        </div>
    </div>

<script>
    // --- 1. VERİLER (Resim kaynakları güncellendi) ---
    // Gerçek fotolarını koyduğunda buradaki linkleri değiştireceksin.
    const memories = [
        { date: "Ocak 2024", title: "Tanıştığımız Gün", desc: "Hayatımın değiştiği an.", img: "https://placehold.co/400x300/222/fff?text=Tanisma" },
        { date: "14 Şubat 2024", title: "İlk Sevgililer Günü", desc: "O kadar gergindim ki!", img: "https://placehold.co/400x300/222/fff?text=14+Subat" },
        { date: "Yaz 2024", title: "Ege Turu", desc: "Mavi sular ve sen.", img: "https://placehold.co/400x300/222/fff?text=Tatil" },
        { date: "Kasım 2024", title: "Konser", desc: "Sesimiz kısılana kadar bağırdık.", img: "https://placehold.co/400x300/222/fff?text=Konser" },
        { date: "Bugün", title: "Seni Seviyorum", desc: "Nice aylarımıza, yıllarımıza...", img: "https://placehold.co/400x300/222/fff?text=Love" }
    ];

    // --- 2. SES MOTORU (Hata Korumalı) ---
    let audioCtx;
    
    function initAudio() {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                audioCtx = new AudioContext();
            }
        } catch (e) {
            console.log("Ses motoru başlatılamadı:", e);
        }
    }

    function playTickSound() {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume(); // Tarayıcı durdurduysa devam ettir

        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'triangle'; 
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); 
        oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1); 
        
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1);
    }

    // --- 3. DOM OLUŞTURMA ---
    const track = document.getElementById('track');
    const TICK_GAP = 42; 

    memories.forEach((mem, index) => {
        const gap = index === 0 ? 5 : 8;
        for(let i=0; i<gap; i++) {
            let s = document.createElement('div');
            s.className = 'tick-s';
            track.appendChild(s);
        }

        let l = document.createElement('div');
        l.className = 'tick-l';
        l.dataset.date = mem.date;
        l.innerHTML = `
            <div class="memory-card">
                <img src="${mem.img}" alt="${mem.title}">
                <h3>${mem.title}</h3>
                <p>${mem.desc}</p>
                <small>${mem.date}</small>
            </div>
        `;
        track.appendChild(l);
    });
    
    for(let i=0; i<5; i++) { track.appendChild(document.createElement('div').className='tick-s'); }


    // --- 4. TOUCH & MOUSE MANTIĞI (Bilgisayar Desteği Eklendi) ---
    let currentX = 0;
    let targetX = 0;
    let isDragging = false;
    let startX = 0;
    
    const timeline = document.getElementById('timeline');
    const yearDisplay = document.getElementById('yearDisplay');
    const bigTicks = document.querySelectorAll('.tick-l');

    // Başlat Butonu
    const startBtn = document.getElementById('startBtn');
    const overlay = document.getElementById('start-overlay');
    
    startBtn.addEventListener('click', () => {
        console.log("Butona tıklandı!"); // Debug için
        initAudio();
        
        overlay.style.opacity = '0';
        overlay.style.pointerEvents = 'none'; // Tıklamayı engelle
        document.getElementById('yearDisplay').style.opacity = '1';
        
        setTimeout(() => { 
            overlay.style.display = 'none'; 
        }, 800);
    });

    // --- ORTAK FONKSİYONLAR (Touch ve Mouse için) ---
    function handleStart(clientX) {
        isDragging = true;
        startX = clientX;
    }

    function handleMove(clientX) {
        if(!isDragging) return;
        const x = clientX;
        const diff = (x - startX) * 1.5; 
        targetX += diff;
        startX = x;

        // Sınır Kontrolü
        if(targetX > 0) targetX = 0; 
        const minX = -track.offsetWidth - window.innerWidth; // Biraz daha pay bırak
        if(targetX < minX) targetX = minX;
    }

    function handleEnd() {
        isDragging = false;
    }

    // --- EVENT LISTENERS ---
    
    // 1. Touch Events (Mobil)
    document.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX), { passive: false });
    document.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX), { passive: false });
    document.addEventListener('touchend', handleEnd);

    // 2. Mouse Events (Bilgisayar)
    document.addEventListener('mousedown', (e) => handleStart(e.clientX));
    document.addEventListener('mousemove', (e) => handleMove(e.clientX));
    document.addEventListener('mouseup', handleEnd);
    document.addEventListener('mouseleave', handleEnd); // Mouse ekrandan çıkarsa bırak

    // 3. Mouse Wheel (Opsiyonel)
    document.addEventListener('wheel', (e) => {
        targetX -= e.deltaY;
        if(targetX > 0) targetX = 0;
    });

    // --- 5. ANIMASYON LOOP ---
    let lastPlayedTickIndex = -1;

    function animate() {
        // Yumuşak geçiş (Lerp)
        currentX += (targetX - currentX) * 0.1;
        timeline.style.transform = `translateX(${currentX}px)`;

        // Ses Efekti (TİK)
        let tickIndex = Math.floor(Math.abs(currentX) / TICK_GAP);
        if (tickIndex > lastPlayedTickIndex) {
            playTickSound();
            lastPlayedTickIndex = tickIndex;
            if (navigator.vibrate) navigator.vibrate(5); 
        }

        // Aktif Kartı Bulma
        let centerPoint = Math.abs(currentX) + (window.innerWidth / 2);

        bigTicks.forEach(tick => {
            let tickLeft = tick.offsetLeft;
            // Ekrana ortalandı mı? (Hassasiyet ayarı)
            if (tickLeft > centerPoint - 100 && tickLeft < centerPoint + 100) {
                if (!tick.classList.contains('active')) {
                    tick.classList.add('active');
                    yearDisplay.innerText = tick.dataset.date;
                    yearDisplay.style.transform = "translateX(-50%) scale(1.2)";
                }
            } else {
                if (tick.classList.contains('active')) {
                    tick.classList.remove('active');
                    yearDisplay.style.transform = "translateX(-50%) scale(1)";
                }
            }
        });

        requestAnimationFrame(animate);
    }
    
    animate();

    function sendWhatsapp() {
        // Telefon numaranı buraya yazmayı unutma!
        window.location.href = "https://wa.me/905xxxxxxxxx?text=Hazırlanıyorum,%20gelip%20beni%20alabilirsin!%20❤️"; 
    }

</script>
</body>
</html>
