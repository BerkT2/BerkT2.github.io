<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japonya 2026 | Canlı Gezi ve Harita Rehberi</title>
    <style>
        :root {
            --bg-color: #f6f8fa;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --primary: #bc1e22; /* Torii Kırmızısı */
            --success: #10b981; /* Gezildi Yeşili */
            --tourist-color: #ef4444;
            --food-color: #f97316;
            --shop-color: #3b82f6;
            --hotel-color: #a855f7;
            --shadow: 0 4px 14px rgba(0,0,0,0.06);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Harita Sabit Alanı */
        #map-container {
            height: 42vh;
            width: 100%;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            z-index: 10;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .map-btn {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: white;
            border: none;
            padding: 12px;
            border-radius: 50%;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 11;
            cursor: pointer;
        }

        .map-btn svg { width: 24px; height: 24px; fill: var(--primary); }

        /* İçerik ve Liste Alanı */
        #content-container {
            height: 58vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
        }

        /* Yatay Kaydırılabilir Sekmeler */
        .tabs-wrapper {
            background: white;
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
        }

        .tabs-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs-scroll::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: #f1f5f9;
            color: var(--text-muted);
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Kart Listesi Akış Alanı */
        .list-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            padding-bottom: 30px;
        }

        /* Dinamik Kart Yapısı */
        .card {
            background: var(--card-bg);
            border: 1px solid #e2e8f0;
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
        }

        .card.checked {
            background: #f8fafc;
            opacity: 0.6;
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
        }

        .card-left input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            display: grid;
            place-content: center;
            transition: all 0.2s ease;
            cursor: pointer;
            flex-shrink: 0;
        }

        .card-left input[type="checkbox"]::before {
            content: "";
            width: 12px;
            height: 12px;
            transform: scale(0);
            transition: all 0.2s ease;
            box-shadow: inset 1em 1em var(--success);
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .card-left input[type="checkbox"]:checked {
            border-color: var(--success);
            background-color: #ecfdf5;
        }

        .card-left input[type="checkbox"]:checked::before { transform: scale(1); }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-color);
        }

        .card.checked .card-title { text-decoration: line-through; color: var(--text-muted); }

        .card-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        .source-tag {
            font-weight: 700;
            color: var(--primary);
        }

        .card-right-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 16px;
        }

        .type-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 800;
            color: white;
            align-self: flex-start;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .badge-tourist { background: var(--tourist-color); }
        .badge-food { background: var(--food-color); }
        .badge-shop { background: var(--shop-color); }
        .badge-hotel { background: var(--hotel-color); }
        .badge-checked { background: var(--success); }

        /* Notlar Tabu Tasarımları */
        .note-block {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }
        .note-block h3 {
            font-size: 15px;
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: 800;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 6px;
        }
        .note-block ul {
            list-style: none;
            padding-left: 0;
        }
        .note-block li {
            font-size: 13px;
            color: var(--text-color);
            margin-bottom: 8px;
            position: relative;
            padding-left: 14px;
            line-height: 1.4;
        }
        .note-block li::before {
            content: "•";
            color: var(--primary);
            font-weight: bold;
            position: absolute;
            left: 0;
            top: 0;
        }
    </style>
</head>

        ];

        let map;
        let markers = {};
        let activeSection = 'tokyo';
        let userLocationMarker = null;
        let activeInfoWindow = null;

        const typeColors = {
            hotel: "#a855f7",
            tourist: "#ef4444",
            food: "#f97316",
            shop: "#3b82f6",
            checked: "#10b981"
        };

        // Google Harita Kurulum Fonksiyonu
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 35.6895, lng: 139.6917 },
                zoom: 12,
                disableDefaultUI: true,
                zoomControl: false,
                styles: [
                    { featureType: "poi.business", stylers: [{ visibility: "off" }] },
                    { featureType: "transit", stylers: [{ visibility: "simplified" }] }
                ]
            });

            // Tüm Pinleri Haritaya Basma
            locations.forEach(loc => {
                const isChecked = localStorage.getItem(loc.id) === 'true';
                const color = isChecked ? typeColors.checked : typeColors[loc.type];

                const marker = new google.maps.Marker({
                    position: { lat: loc.lat, lng: loc.lng },
                    map: map,
                    title: loc.title,
                    icon: createMarkerIcon(color)
                });

                const infoWindow = new google.maps.InfoWindow({
                    content: `
                        <div style="font-family:sans-serif; padding:4px; max-width:210px;">
                            <h4 style="margin:0 0 4px 0; font-size:14px; color:#1e293b;">${loc.title}</h4>
                            <p style="margin:0 0 8px 0; font-size:11px; color:#64748b;">${loc.desc}</p>
                            <button onclick="toggleFromMap('${loc.id}')" style="background:${isChecked ? '#ef4444':'#10b981'}; color:white; border:none; padding:8px 10px; border-radius:6px; font-size:11px; font-weight:bold; width:100%; cursor:pointer;">
                                ${isChecked ? 'Yapılmadı İşaretle' : 'Gezildi / Tamamlandı'}
                            </button>
                        </div>`
                });

                marker.addListener('click', () => {
                    if (activeInfoWindow) activeInfoWindow.close();
                    infoWindow.open(map, marker);
                    activeInfoWindow = infoWindow;
                });

                markers[loc.id] = marker;
            });

            renderLists();
            fitBoundsForSection('tokyo');
        }

        // Özelleştirilmiş Dinamik SVG Pin Çizimi
        function createMarkerIcon(color) {
            return {
                path: 'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z',
                fillColor: color,
                fillOpacity: 1,
                strokeWeight: 1.5,
                strokeColor: '#ffffff',
                scale: 1.4,
                anchor: new google.maps.Point(12, 22)
            };
        }

        // Sekme Değiştirme Motoru
        function switchSection(sectionName, element) {
            activeSection = sectionName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            renderLists();
            if (sectionName !== 'notes') {
                fitBoundsForSection(sectionName);
            }
        }

        // Haritayı Seçili Sekmedeki Pinlere Göre Otomatik Odaklama
        function fitBoundsForSection(section) {
            if (!map) return;
            const bounds = new google.maps.LatLngBounds();
            let count = 0;

            locations.forEach(loc => {
                let match = false;
                if (section === 'food' && loc.type === 'food') match = true;
                else if (section === 'shopping' && loc.type === 'shop') match = true;
                else if (loc.city === section) match = true;

                if (match) {
                    bounds.extend(new google.maps.LatLng(loc.lat, loc.lng));
                    count++;
                }
            });

            if (count > 0) {
                map.fitBounds(bounds);
                if (count === 1) map.setZoom(15);
            }
        }

        // Dinamik Arayüz ve Tikleme Listesi Oluşturucu
        function renderLists() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';

            // ÖNEMLİ NOTLAR SEKMESİ SEÇİLDİYSE ÖZEL TASARIMI BAS
            if (activeSection === 'notes') {
                container.innerHTML = `
                    <div class="note-block">
                        <h3>Berk'in Çıkardığı Altın Notlar</h3>
                        <ul>
                            <li><strong>Havalimanı İlk 3 Adım:</strong> Dış hatlar çıkışı sağdaki döviz bürosundan min 50$ nakit bozdurun. Merdivenlerden hemen inince soldaki metro alanından Welcome Suica kart alın ve 5.000 Yen bakiye yükleyin[cite: 4].</li>
                            <li><strong>Nakit & ATM Taktikleri:</strong> Pasaportunuz her an yanınızda olsun, 5.000 Yen üzeri alışverişlerde direkt kasada vergi düşülür (Tax-Free)[cite: 4]. Küçük restoranlarda sadece nakit geçer; nakitiniz biterse en yakın 7-Eleven ATM'lerini kullanın[cite: 4].</li>
                            <li><strong>Sushi & Yemek Seçimi:</strong> Tamamen İngilizce isimli ve İngilizce menülü yerler turist tuzağıdır ve iyi değildir; her zaman lokal, yerel sushicileri tercih edin[cite: 4]. Market ödemesini yaptıktan sonra köşeye geçip poşetlemeyi kendiniz yaparsınız[cite: 4].</li>
                            <li><strong>Uyum Yasaları:</strong> Yanıltıcı paketleme Japonya'da kesinlikle yasaktır; menüde gördüğünüz porsiyon boyutu/içeriği önünüze gelen tabakla tıpatıp aynı boyuttadır[cite: 4].</li>
                            <li><strong>Ulaşım Kuralı:</strong> Toplu taşımada (metro/tren) hem istasyon girişinde hem de istasyon çıkışında kartınızı veya biletinizi turnikeye basmak zorundasınız[cite: 4].</li>
                        </ul>
                    </div>

                    <div class="note-block">
                        <h3>Atakan'ın PDF Raporu Notları</h3>
                        <ul>
                            <li><strong>Tren Dakikliği:</strong> Japonya'da trenler tam saniyesinde kalkar. İstasyon saatini sakın kaçırmayın, vakti geldiği an kapılar kapanır ve hareket eder[cite: 4].</li>
                            <li><strong>Büyük Valiz Kuralı:</strong> Büyük bavullarla seyahat ediyorsanız, Shinkansen hızlı tren bileti alırken mutlaka "oversize bagaj" (büyük valiz bölmeli) koltuk seçeneğini tercih edin[cite: 4].</li>
                            <li><strong>Eşsiz Fuji Dağı Manzarası:</strong> Tokyo'dan Kyoto/Osaka yönüne giderken trenin sağ tarafındaki cam kenarı koltukları (genelde E koltuğu); dönüş yolculuğunda ise sol kısım Fuji Dağı'nı görür[cite: 4].</li>
                            <li><strong>Tapınak Ziyaret Saati:</strong> Asakusa Senso-ji Tapınağı gün içinde aşırı kalabalık ve insan seli olur. Sıralardan kaçmak için ya sabah çok erken saatte ya da hava karardıktan sonra akşam ışıklarıyla gidin[cite: 4].</li>
                        </ul>
                    </div>

                    <div class="note-block">
                        <h3>Clarissa's PDF İpuçları</h3>
                        <ul>
                            <li><strong>Ön Rezervasyon Şartı:</strong> Shibuya Sky, teamLab Planets, Universal Studios veya özel Michelin restoranları gibi popüler noktalar için biletleri haftalar öncesinden Klook veya resmi sitelerinden ayırtın[cite: 5].</li>
                            <li><strong>Navigasyon ve Konumlandırma:</strong> Şehir içi karmaşık metro hatlarında kaybolmamak için her zaman güncel Google Maps harita bağlantılarını ve platform içi rota yönlendirmelerini takip edin[cite: 5].</li>
                        </ul>
                    </div>
                `;
                return;
            }

            // DİĞER COĞRAFİ SEKMELERİN STANDART ÇIKTISI
            const filtered = locations.filter(loc => {
                if (activeSection === 'food') return loc.type === 'food';
                if (activeSection === 'shopping') return loc.type === 'shop';
                return loc.city === activeSection;
            });

            filtered.forEach(loc => {
                const isChecked = localStorage.getItem(loc.id) === 'true';
                const card = document.createElement('div');
                card.className = `card ${isChecked ? 'checked' : ''}`;
                
                card.innerHTML = `
                    <div class="card-left">
                        <input type="checkbox" id="check-${loc.id}" ${isChecked ? 'checked' : ''} onchange="toggleItemState('${loc.id}', this.checked)">
                        <div class="card-info">
                            <span class="type-badge badge-${isChecked ? 'checked' : loc.type}">${isChecked ? 'Tamamlandı' : loc.type === 'shop' ? 'Alışveriş' : loc.type === 'food' ? 'Gurme' : loc.type === 'hotel' ? 'Otel' : 'Turistik'}</span>
                            <span class="card-title">${loc.title}</span>
                            <span class="card-desc">${loc.desc}</span>
                        </div>
                    </div>
                    <button class="card-right-btn" onclick="focusOnMap(${loc.lat}, ${loc.lng}, '${loc.id}')" title="Haritada Odaklan">
                        🗺️
                    </button>
                `;
                container.appendChild(card);
            });
        }

        // Ana Durum Senkronizasyonu
        function toggleItemState(id, isChecked) {
            localStorage.setItem(id, isChecked);
            
            const loc = locations.find(l => l.id === id);
            const color = isChecked ? typeColors.checked : typeColors[loc.type];
            if (markers[id]) {
                markers[id].setIcon(createMarkerIcon(color));
            }

            if (activeInfoWindow) activeInfoWindow.close();
            renderLists();
        }

        // Harita Üzerindeki Balondan Tikleme Yapıldığında Tetiklenen Fonksiyon
        function toggleFromMap(id) {
            const currentStatus = localStorage.getItem(id) === 'true';
            toggleItemState(id, !currentStatus);
        }

        // Harita Odaklanma Fonksiyonu
        function focusOnMap(lat, lng, id) {
            if (!map) return;
            const position = { lat: parseFloat(lat), lng: parseFloat(lng) };
            map.panTo(position);
            map.setZoom(16);
            
            if (markers[id]) {
                google.maps.event.trigger(markers[id], 'click');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Canlı GPS Konum Takibi
        function trackUserLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;
                    const userPos = new google.maps.LatLng(userLat, userLng);

                    if (map) {
                        map.panTo(userPos);
                        map.setZoom(15);

                        if (userLocationMarker) {
                            userLocationMarker.setPosition(userPos);
                        } else {
                            userLocationMarker = new google.maps.Marker({
                                position: userPos,
                                map: map,
                                title: "Siz Buradasınız",
                                icon: {
                                    path: google.maps.SymbolPath.CIRCLE,
                                    scale: 9,
                                    fillColor: "#1d4ed8",
                                    fillOpacity: 1,
                                    strokeWeight: 3,
                                    strokeColor: "#ffffff"
                                }
                            });
                        }
                    }
                }, () => {
                    alert("GPS konumunuza erişilemedi boss. Telefonunuzun konum servislerini ve tarayıcı izinlerini kontrol edin.");
                }, { enableHighAccuracy: true });
            } else {
                alert("Cihazınız konum takibini desteklemiyor.");
            }
        }
    </script>
    
    <!-- CANLI ÇALIŞAN RESMİ GOOGLE MAPS API SCRIPT ENJEKSİYONU -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCv4yKJGp0Aitq1GQv9DLp-WedIPCIzjZA&callback=initMap" async defer></script>
